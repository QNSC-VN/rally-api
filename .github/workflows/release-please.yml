name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write        # create tags + update CHANGELOG / package.json
  pull-requests: write   # open / update the Release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}

    steps:
      # Generate a short-lived token (1 h) from the rally-release-bot GitHub App.
      # Enterprise rationale:
      #   - Not tied to any human account (survives staff turnover)
      #   - Scoped to this repo only with Contents + Pull-requests permissions
      #   - Auto-expires — no long-lived secret rotation needed
      #   - Actions are audited under the app identity, not a personal account
      #
      # Setup (one-time, org-level — reused by all QNSC repos):
      #   1. Create GitHub App: github.com/organizations/QNSC-VN/settings/apps/new
      #      Name: qnsc-automation
      #      Permissions: Contents (write), Pull requests (write), Metadata (read)
      #      Webhooks: disabled
      #   2. Install the app on specific repos as needed (not "All repositories")
      #   3. Add ORG secret  : RELEASE_BOT_PRIVATE_KEY = <downloaded .pem contents>
      #      github.com/organizations/QNSC-VN/settings/secrets/actions
      #   4. Add ORG variable: RELEASE_BOT_APP_ID = <numeric App ID>
      #      github.com/organizations/QNSC-VN/settings/variables/actions
      #   Other repos that need release automation just use the same secret/var.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  # ── Trigger deploy immediately after Release Please creates the tag ──────────
  # This avoids the user having to push the tag manually.
  # The deploy.yml already watches for  v[0-9]+.[0-9]+.[0-9]+  tag pushes,
  # so this job just re-runs deploy with the new tag as context.
  trigger-deploy:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release tag created
        run: |
          echo "Release Please created tag: ${{ needs.release-please.outputs.tag_name }}"
          echo "deploy.yml will fire automatically on this tag push — no action needed."
          echo "Check: https://github.com/${{ github.repository }}/actions"
