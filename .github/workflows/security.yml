# =============================================================================
# Security — container CVE scan + SAST
#
# Runs on every PR and every push to main (same cadence as CI), plus a weekly
# scheduled run to catch newly disclosed CVEs even without a code push.
#
# Kept separate from ci.yml so it can be:
#   • Independently re-run (no need to re-run unit tests to re-scan)
#   • Independently disabled (rename to security.yml.disabled)
#   • Independently required (branch protection can gate on just this check)
#
# Both jobs report findings to GitHub Security → Code Scanning dashboard.
# =============================================================================
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'   # weekly Monday 04:00 UTC — catch new CVEs between pushes

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Trivy — scan the built Docker image for OS + library CVEs.
  #    Blocks on CRITICAL severity. HIGH is reported but non-blocking until
  #    a fix is available (to avoid blocking on upstream supply chain issues).
  # ─────────────────────────────────────────────────────────────────────────
  trivy:
    name: Container security scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: rally-api:scan
          cache-from: type=gha,scope=api   # reuses cache from CI build job if available

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rally-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'          # fail on CRITICAL
          ignore-unfixed: true    # skip CVEs with no fix available

      - name: Upload Trivy SARIF to GitHub Security
        if: always()             # upload even if scan failed
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ─────────────────────────────────────────────────────────────────────────
  # 2. CodeQL — static application security testing (SAST).
  #    Scans TypeScript source for injection, path traversal, prototype
  #    pollution, and other OWASP Top 10 patterns.
  # ─────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: nghiavan0610/rally-gitops/actions/setup-node-pnpm@main
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build for CodeQL
        run: pnpm build:api

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-typescript
